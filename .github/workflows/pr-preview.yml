name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  preview:
    runs-on: MiniOS

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_DEPLOY_KEY }}

      - name: Deploy to minios
        run: |
          ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 live@10.10.10.108 '/home/live/scripts/deploy-upload-demo.sh'

      - name: Get preview URL
        id: preview
        run: |
          URL=$(ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 live@10.10.10.108 \
            'curl -s http://127.0.0.1:4040/api/tunnels | python3 -c "import sys,json; t=json.load(sys.stdin)[\"tunnels\"][0]; print(t[\"public_url\"])"')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Preview URL: $URL"

      - name: Comment Preview URL
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Preview Ready\n\n${{ steps.preview.outputs.url }}\n\nThis preview is for PR #' + context.issue.number
            })
